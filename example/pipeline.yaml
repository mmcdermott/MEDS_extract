# MEDS_transform-pipeline config for the example walkthrough.
#
# Runs every MEDS_extract stage in order against the raw CSVs that
# ``meds-extract-download`` staged into ``input_dir``. ``input_dir`` and
# ``output_dir`` are supplied as overrides at invocation time.
input_dir: ???
output_dir: ???
event_conversion_config_fp: ${oc.env:EXAMPLE_EVENT_CFG}
shards_map_fp: ${output_dir}/metadata/.shards.json
etl_metadata:
  dataset_name: MEDS_extract_example
  dataset_version: "0.1"
seed: 1
stages:
  - shard_events:
      row_chunksize: 2
      infer_schema_length: 10000
  - split_and_shard_subjects:
      split_fracs:
        train: 0.5
        tuning: 0.25
        held_out: 0.25
      n_subjects_per_shard: 10
  - convert_to_subject_sharded
  - convert_to_MEDS_events:
      do_dedup_text_and_numeric: false
  - merge_to_MEDS_cohort
  - extract_code_metadata
  - finalize_MEDS_metadata
  - finalize_MEDS_data

subject_id_col: patient_id

patients:
  eye_color:
    code: "EYE_COLOR // {eye_color}"
    time: null
  hair_color:
    code: "HAIR_COLOR // {hair_color}"
    time: null
  dob:
    code: MEDS_BIRTH
    time: dob as "%Y-%m-%dT%H:%M:%S"
  dod:
    code: MEDS_DEATH
    time: dod as "%Y-%m-%dT%H:%M:%S"

labs_vitals:
  join:
    input_prefix: stays
    left_on: stay_id
    right_on: stay_id
    columns_from_right:
      - patient_id
  subject_id_col: patient_id
  lab:
    code: test_name
    time: timestamp as "%Y-%m-%dT%H:%M:%S"
    numeric_value: result

medications:
  med:
    code: "{medication_name} // {dose}"
    time: timestamp as "%Y-%m-%dT%H:%M:%S"
    numeric_value: dose

diagnoses:
  dx:
    code: diagnosis_code
    time: timestamp as "%Y-%m-%dT%H:%M:%S"

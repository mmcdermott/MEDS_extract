subject_id_col: patient_id

patients:
  eye_color:
    code: 'f"EYE_COLOR//{$eye_color}"'
    time: null
  hair_color:
    code: 'f"HAIR_COLOR//{$hair_color}"'
    time: null
  dob:
    code: MEDS_BIRTH
    time: '$dob::"%Y-%m-%dT%H:%M:%S"'
  dod:
    code: MEDS_DEATH
    time: '$dod::"%Y-%m-%dT%H:%M:%S"'

labs_vitals:
  join:
    input_prefix: stays
    left_on: stay_id
    right_on: stay_id
    columns_from_right:
      - patient_id
  subject_id_col: patient_id
  lab:
    code: $test_name
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
    numeric_value: $result
    _metadata:
      lab_descriptions:
        description: description

medications:
  med:
    code: 'f"{$medication_name}//{$dose}"'
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
    _metadata:
      medication_classes:
        _match_on: medication_name
        description: drug_class

diagnoses:
  dx:
    code: $diagnosis_code
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'

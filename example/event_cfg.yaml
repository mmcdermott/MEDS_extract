subject_id_col: patient_id

patients:
  eye_color:
    code: 'f"EYE_COLOR//{$eye_color}"'
    time: null
  hair_color:
    code: 'f"HAIR_COLOR//{$hair_color}"'
    time: null
  dob:
    code: '"MEDS_BIRTH"'
    time: '$dob::"%Y-%m-%dT%H:%M:%S"'
  # Note: dod (death date) is omitted here because most patients lack a death date, and the
  # null-heavy column triggers a known polars lazy-evaluation issue with strict strptime parsing.

labs_vitals:
  join:
    input_prefix: stays
    left_on: stay_id
    right_on: stay_id
    columns_from_right:
      - patient_id
  subject_id_col: patient_id
  lab:
    code: $test_name
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
    numeric_value: $result

medications:
  med:
    code: 'f"{$medication_name}//{$dose}"'
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'

diagnoses:
  dx:
    code: $diagnosis_code
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'

# Single MESSY file for the example ETL: carries BOTH the ``sources:`` block that
# ``meds-extract-download`` reads AND the event-conversion config that the MEDS_extract
# pipeline reads. ``MessyConfig.parse`` treats ``sources`` as a reserved top-level key
# (alongside ``_defaults``), so ``convert_to_MEDS_events`` / ``shard_events`` / etc. skip
# it when iterating table definitions.
#
# ``${oc.env:EXAMPLE_RAW_DATA}`` is resolved at CLI-invocation time; the README
# walkthrough + the integration test both set it before running.

sources:
  dataset:
    - type: fsspec
      root: ${oc.env:EXAMPLE_RAW_DATA}
  common:
    - type: physionet
      base_url: https://physionet.org/files/mimic-iv-demo/2.2

_defaults:
  subject_id: $patient_id

patients:
  eye_color:
    code: 'f"EYE_COLOR//{$eye_color}"'
    time: null
  hair_color:
    code: 'f"HAIR_COLOR//{$hair_color}"'
    time: null
  dob:
    code: MEDS_BIRTH
    time: '$dob::"%Y-%m-%dT%H:%M:%S"'
  dod:
    code: MEDS_DEATH
    time: '$dod::"%Y-%m-%dT%H:%M:%S"'

labs_vitals:
  _table:
    join:
      stays:
        key: stay_id
        cols: [patient_id]
  lab:
    code: $test_name
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
    numeric_value: $result
    _metadata:
      lab_descriptions:
        description: description

medications:
  med:
    code: 'f"{$medication_name}//{$dose}"'
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
    _metadata:
      medication_classes:
        _match_on: medication_name
        description: drug_class

diagnoses:
  dx:
    code: $diagnosis_code
    time: '$timestamp::"%Y-%m-%dT%H:%M:%S"'
